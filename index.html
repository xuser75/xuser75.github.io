<!DOCTYPE html>
<html>
<head>
    <title>xuser75 - GitHub Repositories</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid #30363d; margin-bottom: 40px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; color: #58a6ff; }
        .subtitle { font-size: 1.1em; color: #8b949e; }
        .repos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .repo-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; transition: all 0.3s ease; min-height: 300px; display: flex; flex-direction: column; }
        .repo-card:hover { border-color: #58a6ff; box-shadow: 0 0 20px rgba(88, 166, 255, 0.1); }
        .repo-card.loading { opacity: 0.7; }
        .repo-name { display: inline-block; font-size: 1.3em; font-weight: 600; margin-bottom: 8px; }
        .repo-link { color: #58a6ff; text-decoration: none; }
        .repo-link:hover { text-decoration: underline; }
        .repo-desc { color: #8b949e; margin-bottom: 12px; font-size: 0.95em; flex-grow: 1; }
        .repo-meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.85em; color: #8b949e; margin-top: 15px; border-top: 1px solid #30363d; padding-top: 15px; }
        .meta-item { display: flex; align-items: center; gap: 6px; }
        .badge { display: inline-block; background: #1f6feb; color: #fff; padding: 4px 8px; border-radius: 12px; font-size: 0.8em; margin-bottom: 8px; margin-right: 4px; }
        .fork-badge { background: #6e40aa; }
        .skeleton { background: #30363d; height: 16px; border-radius: 4px; margin-bottom: 8px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .footer { text-align: center; margin-top: 60px; padding-top: 20px; border-top: 1px solid #30363d; color: #8b949e; }
        .error { color: #f85149; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>xuser75</h1>
            <p class="subtitle">GitHub Repositories</p>
        </header>
        
        <div class="repos-grid" id="reposGrid">
            <!-- Repos will be loaded here by JavaScript -->
        </div>

        <footer class="footer">
            <p>Last updated: <span id="lastUpdated">loading...</span></p>
            <p><a href="https://github.com/xuser75" class="repo-link">View on GitHub</a></p>
        </footer>
    </div>

    <script>
        const REPOS = ['cloudvista', 'common', 'rustless-linux', 'test', 'xuser75', 'xuser75.github.io'];
        const OWNER = 'xuser75';

        async function fetchRepositories() {
            const grid = document.getElementById('reposGrid');
            grid.innerHTML = '';

            for (const repo of REPOS) {
                const card = createSkeletonCard(repo);
                grid.appendChild(card);

                try {
                    const response = await fetch(`https://api.github.com/repos/${OWNER}/${repo}`);
                    const data = await response.json();
                    updateCard(repo, data);
                } catch (error) {
                    console.error(`Error fetching ${repo}:`, error);
                    updateCardError(repo);
                }
            }

            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
        }

        function createSkeletonCard(repoName) {
            const card = document.createElement('div');
            card.className = 'repo-card loading';
            card.id = `repo-${repoName}`;
            card.innerHTML = `
                <div class="skeleton" style="width: 150px; height: 24px;"></div>
                <div class="skeleton" style="width: 80px; margin-top: 10px;"></div>
                <div class="skeleton" style="width: 100%; margin-top: 12px;"></div>
                <div class="skeleton" style="width: 90%; margin-top: 8px;"></div>
                <div style="flex-grow: 1;"></div>
                <div class="skeleton" style="width: 100%; margin-top: 15px;"></div>
            `;
            return card;
        }

        function updateCard(repoName, data) {
            const card = document.getElementById(`repo-${repoName}`);
            if (!card) return;

            const isFork = data.fork ? '<span class="badge fork-badge">Fork</span>' : '';
            const language = data.language ? `<span class="badge">${data.language}</span>` : '';
            const license = data.license ? `<div class="meta-item">📄 <span>${data.license.name}</span></div>` : '';
            
            const size = data.size < 1024 
                ? `${data.size} KB` 
                : `${(data.size / 1024).toFixed(2)} GB`;

            card.innerHTML = `
                <div class="repo-name">
                    <a href="${data.html_url}" class="repo-link">${data.name}</a>
                    ${isFork}
                </div>
                ${language}
                <p class="repo-desc">${data.description || 'No description'}</p>
                <div class="repo-meta">
                    <div class="meta-item">⭐ <span>${data.stargazers_count} star${data.stargazers_count !== 1 ? 's' : ''}</span></div>
                    <div class="meta-item">👁️ <span>${data.watchers_count} watcher${data.watchers_count !== 1 ? 's' : ''}</span></div>
                    <div class="meta-item">📦 <span>${size}</span></div>
                    ${license}
                </div>
            `;
            card.classList.remove('loading');
        }

        function updateCardError(repoName) {
            const card = document.getElementById(`repo-${repoName}`);
            if (!card) return;

            card.innerHTML = `
                <div class="repo-name">
                    <a href="https://github.com/${OWNER}/${repoName}" class="repo-link">${repoName}</a>
                </div>
                <p class="error">Failed to load data</p>
            `;
            card.classList.remove('loading');
        }

        fetchRepositories();
        setInterval(fetchRepositories, 5 * 60 * 1000);
    </script>
</body>
</html>
