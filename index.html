<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Tracker</title>
    <style>
        .loading-skeleton {
            height: 20px;
            background-color: #e0e0e0;
            margin: 10px 0;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% {
                background-color: #e0e0e0;
            }
            50% {
                background-color: #d6d6d6;
            }
            100% {
                background-color: #e0e0e0;
            }
        }
    </style>
</head>
<body>
    <h1>GitHub Repository Data</h1>
    <div id="repo-data"></div>
    <script>
        const repos = ["cloudvista", "common", "rustless-linux", "test", "xuser75", "xuser75.github.io"];
        const repoDataContainer = document.getElementById('repo-data');

        function fetchRepoData() {
            repoDataContainer.innerHTML = ''; // Clear previous data and show loading skeletons
            repos.forEach(repo => {
                const skeleton = document.createElement('div');
                skeleton.className = 'loading-skeleton';
                repoDataContainer.appendChild(skeleton);

                fetch(`https://api.github.com/repos/xuser75/${repo}`)
                    .then(response => response.json())
                    .then(data => {
                        const repoInfo = document.createElement('div');
                        repoInfo.innerHTML = `
                            <h3>${data.name}</h3>
                            <p>Stars: ${data.stargazers_count}</p>
                            <p>Watchers: ${data.watchers_count}</p>
                            <p>Size: ${data.size} KB</p>
                            <p>Language: ${data.language}</p>
                            <p>License: ${data.license ? data.license.name : 'No License'}</p>
                            <p>Forked: ${data.fork ? 'Yes' : 'No'}</p>
                            <hr>
                        `;
                        repoDataContainer.appendChild(repoInfo);
                    })
                    .catch(error => {
                        console.error('Error fetching repo data:', error);
                    });
            });
        }

        fetchRepoData();
        setInterval(fetchRepoData, 5 * 60 * 1000); // Refresh every 5 minutes
    </script>
</body>
</html>
